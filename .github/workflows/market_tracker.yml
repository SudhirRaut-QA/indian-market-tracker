name: Indian Market Tracker

on:
  schedule:
    # Mon-Fri only (GitHub Actions uses UTC — IST = UTC+5:30)
    # 09:00 IST = 03:30 UTC
    - cron: '30 3 * * 1-5'
    # 09:15 IST = 03:45 UTC
    - cron: '45 3 * * 1-5'
    # 11:00 IST = 05:30 UTC
    - cron: '30 5 * * 1-5'
    # 15:35 IST = 10:05 UTC
    - cron: '5 10 * * 1-5'
    # 18:00 IST = 12:30 UTC
    - cron: '30 12 * * 1-5'
    # 21:00 IST = 15:30 UTC
    - cron: '30 15 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: '--now --full'
        type: choice
        options:
          - '--now --full'
          - '--now --preopen'
          - '--now --sectors'
          - '--now --corporate'
          - '--setup'

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "args=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ='Asia/Kolkata' date +%H)
            MINUTE=$(TZ='Asia/Kolkata' date +%M)
            IST_TIME="${HOUR}:${MINUTE}"
            echo "IST Time: $IST_TIME"
            
            if [ "$HOUR" -lt 9 ] || ([ "$HOUR" -eq 9 ] && [ "$MINUTE" -lt 10 ]); then
              echo "args=--now --preopen" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -lt 16 ]; then
              echo "args=--now --sectors --options" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -lt 19 ]; then
              echo "args=--now --sectors --corporate" >> $GITHUB_OUTPUT
            else
              echo "args=--now --full" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m tracker ${{ steps.mode.outputs.args }}

      - name: Upload snapshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: market-data-${{ github.run_number }}
          path: |
            snapshots/
            data/
          retention-days: 30
