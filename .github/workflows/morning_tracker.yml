name: Market Tracker - Morning Session

on:
  schedule:
    # Run at 08:45 IST = 03:15 UTC (Mon-Fri)
    - cron: '15 3 * * 1-5'
  workflow_dispatch:
    inputs:
      manual_trigger:
        description: 'Manual morning session trigger'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  morning-tracker:
    runs-on: ubuntu-latest
    # Timeout after 3 hours (covers all morning slots)
    timeout-minutes: 190
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create .env file
        run: |
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
      
      - name: Run Morning Session (3 hours)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "Starting morning session at $(date)"
          echo "Will run for 180 minutes covering slots: 09:00, 09:08, 09:15, 09:30, 11:00"
          
          # Run scheduler for 180 minutes
          python -m tracker --schedule --run-for-minutes 180
          
          echo "Morning session complete at $(date)"
      
      - name: Upload data artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-data-${{ github.run_number }}
          path: |
            data/excel/*.xlsx
            data/snapshots/**/*.json
            data/daily/*.json
          retention-days: 7
      
      - name: Commit data updates
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "Morning session data - $(date +'%Y-%m-%d %H:%M IST')"
          git push
