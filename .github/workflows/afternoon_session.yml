name: Afternoon Session (15:35–21:00 IST)

# Triggered once at 15:15 IST → runs internal scheduler for 5.5 hours.
# Covers: 15:35 Market Close, 18:00 Evening Summary, 21:00 Night Summary

on:
  schedule:
    - cron: '42 9 * * 1-5'    # 15:12 IST = 09:42 UTC  (Mon-Fri)
  workflow_dispatch:
    inputs:
      minutes:
        description: 'Override run duration (minutes)'
        required: false
        default: '350'

permissions:
  contents: write

jobs:
  afternoon-session:
    runs-on: ubuntu-latest
    timeout-minutes: 370      # 6h 10m hard limit (within GitHub 6h max)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env
        run: |
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "GOOGLE_DRIVE_FOLDER_ID=${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}" >> .env
          echo "GOOGLE_SERVICE_ACCOUNT_JSON=${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" >> .env

      - name: Run afternoon scheduler
        env:
          TZ: Asia/Kolkata
        run: |
          MINUTES=${{ github.event.inputs.minutes || '350' }}
          echo "🌇 Afternoon session — running for ${MINUTES} minutes"
          echo "Slots: 15:35, 18:00, 21:00 IST"
          python -m tracker --schedule \
            --slots "15:35,18:00,21:00" \
            --catch-up \
            --run-for-minutes ${MINUTES}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: afternoon-${{ github.run_number }}
          path: |
            data/excel/*.xlsx
            data/snapshots/**/*.json
          retention-days: 7

      - name: Commit data
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ || true
          git diff --staged --quiet || git commit -m "📊 Afternoon session $(date -u +'%Y-%m-%d')"
          git push || true
